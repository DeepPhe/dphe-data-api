name: Publish distribution release assets

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional DeepPhe-Dist release tag. Defaults to dphe-data-api-v<package version>.
        required: false
        type: string

env:
  DIST_REPO: DeepPhe/DeepPhe-Dist
  PACKAGE_NAME: dphe-data-api

jobs:
  build-and-publish:
    name: Build and publish assets
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build standalone executables
        run: npm run build

      - name: Resolve release metadata
        id: release
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag || '' }}
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"

          if [ -n "$INPUT_RELEASE_TAG" ]; then
            release_tag="$INPUT_RELEASE_TAG"
          else
            release_tag="${PACKAGE_NAME}-v${version}"
          fi

          {
            echo "tag=${release_tag}"
            echo "title=${PACKAGE_NAME} v${version}"
            echo "notes<<EOF"
            echo "Built from ${GITHUB_REPOSITORY}@${GITHUB_SHA}."
            echo
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Verify build artifacts
        shell: bash
        run: |
          mapfile -t assets < <(find dist -maxdepth 1 -type f -print | sort)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error title=No build artifacts::npm run build did not produce files in dist/."
            exit 1
          fi

          printf 'Build artifacts:\n'
          printf '%s\n' "${assets[@]}"

      - name: Create or update DeepPhe-Dist release
        env:
          GH_TOKEN: ${{ secrets.DEEPHE_DIST_RELEASE_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
          RELEASE_NOTES: ${{ steps.release.outputs.notes }}
        shell: bash
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error title=Missing release token::Add a DEEPHE_DIST_RELEASE_TOKEN secret with contents:write access to ${DIST_REPO}."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$DIST_REPO" > /dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$DIST_REPO" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES"
          else
            gh release create "$RELEASE_TAG" \
              --repo "$DIST_REPO" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.DEEPHE_DIST_RELEASE_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          mapfile -t assets < <(find dist -maxdepth 1 -type f -print | sort)
          gh release upload "$RELEASE_TAG" "${assets[@]}" \
            --repo "$DIST_REPO" \
            --clobber
